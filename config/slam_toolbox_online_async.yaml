slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.3
    transform_publish_period: 0.05
    map_update_interval: 2.0
    throttle_scans: 1
    enable_interactive_mode: true
